server {
    listen 80;
    server_name _;

    location / {
        root /www/wwwroot/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /titan-proxy/jc/ {
        proxy_pass https://jc.titan007.com/;
        proxy_set_header Host jc.titan007.com;
        proxy_set_header Referer https://jc.titan007.com/;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    location /titan-proxy/zq/ {
        proxy_pass https://zq.titan007.com/;
        proxy_set_header Host zq.titan007.com;
        proxy_set_header Referer https://zq.titan007.com/;
        proxy_set_header Origin https://zq.titan007.com;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    location /titan-proxy/vip/ {
        proxy_pass https://vip.titan007.com/;
        proxy_set_header Host vip.titan007.com;
        proxy_set_header Referer https://vip.titan007.com/;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    location /titan-proxy/info/ {
        proxy_pass https://info.titan007.com/;
        proxy_set_header Host info.titan007.com;
        proxy_set_header Referer https://info.titan007.com/;
        proxy_set_header Origin https://info.titan007.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8";
        proxy_set_header Accept-Encoding identity;
        proxy_ssl_server_name on;
        proxy_buffering off;
        proxy_intercept_errors on;
        proxy_redirect https://info.titan007.com/ /titan-proxy/info/;
    }

    location /500-proxy/ {
        proxy_pass https://odds.500.com/;
        proxy_set_header Host odds.500.com;
        proxy_set_header Referer https://odds.500.com/;
        proxy_set_header Origin https://odds.500.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8";
        proxy_set_header Accept-Encoding identity;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    location /live500-proxy/ {
        proxy_pass https://live.500.com/;
        proxy_set_header Host live.500.com;
        proxy_set_header Referer https://live.500.com/;
        proxy_set_header Origin https://live.500.com;
        proxy_set_header User-Agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36";
        proxy_set_header Accept "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8";
        proxy_set_header Accept-Encoding identity;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    location /macau-proxy/ {
        proxy_pass https://www.macauslot.com/;
        proxy_set_header Host www.macauslot.com;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    location /sporttery-proxy/ {
        proxy_pass https://webapi.sporttery.cn/;
        proxy_set_header Host webapi.sporttery.cn;
        proxy_set_header Referer https://www.sporttery.cn/;
        proxy_set_header Origin https://www.sporttery.cn;
        proxy_ssl_server_name on;
        proxy_buffering off;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}
